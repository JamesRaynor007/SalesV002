<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Plantillas XLSX</title>
    <link rel="stylesheet" href="Sales.css" />
</head>
<body>
    <div class="container">
        <h1>Gestor de Plantillas XLSX</h1>
        <div class="buttons">
            <button id="downloadBtn">Descargar plantilla XLSX</button>
            <input type="file" id="loadFile" accept=".xlsx" />

            <!-- Filtro por mes y año -->
            <button id="filterDateBtn">Filtrar por fecha</button>
            <select id="monthSelect">
                <option value="">Mes</option>
                <option value="01">Enero</option>
                <option value="02">Febrero</option>
                <option value="03">Marzo</option>
                <option value="04">Abril</option>
                <option value="05">Mayo</option>
                <option value="06">Junio</option>
                <option value="07">Julio</option>
                <option value="08">Agosto</option>
                <option value="09">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>
            <select id="yearSelect">
                <option value="">Año</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
            <button id="showAllDatesBtn">Mostrar todas las fechas</button>

            <!-- Filtro por producto -->
            <button id="filterProductBtn">Filtrar por producto</button>
            <select id="productSelect">
                <option value="">Selecciona un producto</option>
            </select>
            <button id="showAllProductsBtn">Mostrar todos los productos</button>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo de Producto</th>
                        <th>Unidades</th>
                        <th>Importe</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="totals" id="totalsContainer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="Javascript/Sales.js"></script>
</body>
</html>
